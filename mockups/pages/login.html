<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote Market - Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#020617',
            surface: '#0f172a',
            border: '#1e293b',
            primary: '#22c55e',
            primaryHover: '#16a34a',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-white min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Vote Market</h1>
      <p class="text-slate-400 mt-2">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <div class="bg-surface border border-border rounded-xl p-6 space-y-6">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
        <input 
          type="email" 
          placeholder="you@example.com"
          class="w-full bg-background border border-border rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
        <input 
          type="password" 
          placeholder="••••••••"
          class="w-full bg-background border border-border rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
        >
      </div>

      <!-- Error State (hidden by default) -->
      <div class="hidden bg-danger/10 border border-danger/30 rounded-lg p-3 text-danger text-sm">
        Invalid email or password
      </div>

      <!-- Submit Button -->
      <button class="w-full bg-primary hover:bg-primaryHover text-white font-semibold py-3 rounded-lg transition-colors">
        Log in
      </button>

      <!-- Divider -->
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-border"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-surface text-slate-400">Or continue with</span>
        </div>
      </div>

      <!-- Google OAuth -->
      <button class="w-full bg-background border border-border hover:border-slate-500 text-white font-medium py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
    </div>

    <!-- Sign Up Link -->
    <p class="text-center text-slate-400 mt-6">
      Don't have an account? 
      <a href="signup.html" class="text-primary hover:text-primaryHover font-medium">Sign up</a>
    </p>
  </div>
</body>
</html>
